<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Ajouter des valeurs</title>
</head>
<body>
<div class="container-fluid row m-3">
    <div class="col-md-6">
    <label class="form-label" >Nom:</label>
    <input class="form-control " type="text" id="Nom" placeholder="Votre nom">
    <p id="errNom"></p>
    </div>
<div class="col-md-6">
    <label class="form-label">Prenom:</label>
    <input class="form-control" type="text" id="Prenom" placeholder="Votre prenom">
    <p id="errPrenom"></p>
</div>

<div class="col-md-6">
    <label class="form-label">Date naissance:</label>
    <input class="form-control" type="date" id="naissance">
    <p id="errNaiss"></p>
</div>
<div class="col-md-6">
    <label for="" class="form-label">Email:</label>
    <input class="form-control" type="email" name="email" id="email">
    <p id="errEmail"></p>
</div class="col-md-6">
<div>
    <label for="" class="form-label">Password:</label>
    <input class="form-control" type="password" name="" id="password">
    <p id="errPassword"></p>
</div class="col-md-6">
<div class="row">
    <label class="form-label">Sexe:</label>
    <div  class="form-check form-switch col-md-6"><input  class="form-check-input" type="radio" id="f" name="sexe">F</div>
     <div class="form-check form-switch col-md-6"><input  class="form-check-input" type="radio" id="h" name="sexe">H</div>
    <p id="errSexe"></p>
</div>
<div class="col-md-12">
    <label for="" class="form-label">Ville:</label>
    <select id="ville" class="form-select">
    <option>--Choisir une ville--</option>
    <option value="Ouarzazate">Ouarzazate</option>
    <option value="Marrakech">Marrakech</option>
    <option value="Marrakech1">Marrakech1</option>
    <option value="Marrakech2">Marrakech2</option>
</select>
<p id="errVille"></p>
</div>

<div>
    <label class="form-label">Photo:</label>
    <input class="form-control" type="file" id="photo">
    <p id="errPhoto"></p>
</div>

<div class="d-flex justify-content-center  gap-2 m-3">
    <button class="btn btn-primary w-25 p-2" id="btnValider" onclick="Valider()">Valider</button>
    <button class="btn btn-warning w-25 p-2" id="btnVider" onclick="Vider()">Vider</button>
</div>
</div>
<table class="table table-striped">
    <thead>
        <tr>
            <th>nom</th>
            <th>prenom</th>
            <th>email</th>
            <th>password</th>
            <th>naissance</th>
            <th>ville</th>
            <th>sexe </th>
            <th>photo</th>
        </tr>
    </thead>
    <tbody id="table_body">

    </tbody>
</table>
<script src="script.js"></script>

</body>
</html>
